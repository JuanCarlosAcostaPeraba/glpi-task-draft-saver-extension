<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GLPI Draft Saver Config</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #333;
      --label-color: #555;
      --border-color: #ccc;
      --footer-border: #eee;
      --footer-text: #888;
      --status-color: #28a745;
    }

    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --label-color: #aaa;
      --border-color: #444;
      --footer-border: #333;
      --footer-text: #777;
    }

    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      color: var(--text-color);
    }
    .field {
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .field.vertical {
      flex-direction: column;
      align-items: flex-start;
    }
    label {
      font-size: 13px;
      color: var(--label-color);
    }
    select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      font-size: 13px;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2c6eb0;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .status {
      font-size: 12px;
      color: var(--status-color);
      margin-top: 10px;
      display: none;
      text-align: center;
    }
    .footer {
      font-size: 11px;
      color: var(--footer-text);
      text-align: center;
      margin-top: 20px;
      border-top: 1px solid var(--footer-border);
      padding-top: 10px;
    }
    hr {
      border: 0;
      border-top: 1px solid var(--footer-border);
      margin: 15px 0;
    }

    /* Window Mockup Selector */
    .window-mockup {
      width: 180px;
      height: 120px;
      border: 2px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .dark-mode .window-mockup {
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .window-header {
      height: 16px;
      background-color: var(--border-color);
      display: flex;
      align-items: center;
      padding-left: 6px;
      gap: 4px;
      transition: background-color 0.3s;
    }
    .window-header::before,
    .window-header::after,
    .window-header .btn-mock {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--footer-text);
      opacity: 0.5;
    }
    .position-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      flex: 1;
      padding: 6px;
      gap: 6px;
    }
    .pos-btn {
      background-color: transparent;
      border: 1px dashed var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .pos-btn:focus {
      outline: none;
    }
    .pos-btn:hover {
      background-color: rgba(44, 110, 176, 0.1);
      border-color: #2c6eb0;
      border-style: solid;
    }
    .dark-mode .pos-btn:hover {
      background-color: rgba(59, 130, 246, 0.2);
      border-color: #3b82f6;
    }
    .pos-btn.active {
      background-color: #2c6eb0;
      border: 1px solid #2c6eb0;
      box-shadow: 0 0 5px rgba(44, 110, 176, 0.4);
    }
    .dark-mode .pos-btn.active {
      background-color: #3b82f6;
      border: 1px solid #3b82f6;
      box-shadow: 0 0 5px rgba(59, 130, 246, 0.4);
    }
    .pos-btn.active::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; 
      height: 10px;
      background-color: white;
      border-radius: 2px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h2>Configuración</h2>
  
  <div class="field">
    <label for="theme-mode">Modo Oscuro:</label>
    <label class="switch">
      <input type="checkbox" id="theme-mode">
      <span class="slider"></span>
    </label>
  </div>

  <hr>

  <div class="field vertical" style="align-items: center;">
    <label style="margin-bottom: 10px; width: 100%; text-align: left;">Posición de avisos:</label>
    <div class="window-mockup">
      <div class="window-header"><div class="btn-mock"></div></div>
      <div class="position-grid" id="toast-position-grid">
        <button class="pos-btn" data-value="top-left" title="Arriba izquierda"></button>
        <button class="pos-btn" data-value="top-center" title="Centro arriba"></button>
        <button class="pos-btn" data-value="top-right" title="Arriba derecha"></button>
        <button class="pos-btn" data-value="left-center" title="Centro izquierda"></button>
        <button class="pos-btn" data-value="center" title="Centro"></button>
        <button class="pos-btn" data-value="right-center" title="Centro derecha"></button>
        <button class="pos-btn" data-value="bottom-left" title="Abajo izquierda"></button>
        <button class="pos-btn" data-value="bottom-center" title="Centro abajo"></button>
        <button class="pos-btn" data-value="bottom-right" title="Abajo derecha (Por defecto)"></button>
      </div>
    </div>
    <div id="position-label" style="font-size: 11px; color: var(--footer-text); margin-top: 8px; font-style: italic;">Abajo derecha (Por defecto)</div>
  </div>

  <div id="status" class="status">¡Guardado correctamente!</div>

  <div class="footer">
    GLPI Draft Saver Pro v1.2.0
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GLPI Draft Saver Config</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #333;
      --label-color: #555;
      --border-color: #ccc;
      --footer-border: #eee;
      --footer-text: #888;
      --status-color: #28a745;
    }

    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --label-color: #aaa;
      --border-color: #444;
      --footer-border: #333;
      --footer-text: #777;
    }

    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      color: var(--text-color);
    }
    .field {
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .field.vertical {
      flex-direction: column;
      align-items: flex-start;
    }
    label {
      font-size: 13px;
      color: var(--label-color);
    }
    select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      font-size: 13px;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2c6eb0;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .status {
      font-size: 12px;
      color: var(--status-color);
      margin-top: 10px;
      display: none;
      text-align: center;
    }
    .footer {
      font-size: 11px;
      color: var(--footer-text);
      text-align: center;
      margin-top: 20px;
      border-top: 1px solid var(--footer-border);
      padding-top: 10px;
    }
    hr {
      border: 0;
      border-top: 1px solid var(--footer-border);
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <h2>Configuración</h2>
  
  <div class="field">
    <label for="theme-mode">Modo Oscuro:</label>
    <label class="switch">
      <input type="checkbox" id="theme-mode">
      <span class="slider"></span>
    </label>
  </div>

  <hr>

  <div class="field vertical">
    <label for="toast-position" style="margin-bottom: 5px;">Posición de avisos:</label>
    <select id="toast-position">
      <option value="bottom-right">Abajo derecha (Por defecto)</option>

      <option value="top-right">Arriba derecha</option>
      <option value="bottom-left">Abajo izquierda</option>
      <option value="top-left">Arriba izquierda</option>
      <option value="center">Centro</option>
      <option value="top-center">Centro arriba</option>
      <option value="bottom-center">Centro abajo</option>
      <option value="right-center">Centro derecha</option>
      <option value="left-center">Centro izquierda</option>
    </select>
  </div>

  <div id="status" class="status">¡Guardado correctamente!</div>

  <div class="footer">
    GLPI Draft Saver Pro v1.2.0
  </div>

  <script src="popup.js"></script>
</body>
</html>

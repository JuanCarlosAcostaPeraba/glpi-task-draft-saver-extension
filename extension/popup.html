<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GLPI Draft Saver Config</title>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      color: #333;
    }
    .field {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #555;
    }
    select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 13px;
    }
    .status {
      font-size: 12px;
      color: #28a745;
      margin-top: 10px;
      display: none;
    }
    .footer {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <h2>Configuración</h2>
  
  <div class="field">
    <label for="toast-position">Posición de avisos:</label>
    <select id="toast-position">
      <option value="bottom-right">Abajo derecha (Por defecto)</option>
      <option value="top-right">Arriba derecha</option>
      <option value="bottom-left">Abajo izquierda</option>
      <option value="top-left">Arriba izquierda</option>
      <option value="center">Centro</option>
      <option value="top-center">Centro arriba</option>
      <option value="bottom-center">Centro abajo</option>
      <option value="right-center">Centro derecha</option>
      <option value="left-center">Centro izquierda</option>
    </select>
  </div>

  <div id="status" class="status">¡Guardado correctamente!</div>

  <div class="footer">
    GLPI Draft Saver Pro v1.1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>

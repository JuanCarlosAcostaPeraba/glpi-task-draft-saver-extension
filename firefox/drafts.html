<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador de Borradores - GLPI Draft Saver</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #2d3748;
      --text-muted: #718096;
      --border-color: #e2e8f0;
      --primary-color: #2c6eb0;
      --primary-hover: #1e528a;
      
      --color-task: #e2f0fd;
      --text-task: #0b5ed7;
      --color-followup: #e6fcf5;
      --text-followup: #0ca678;
      --color-solution: #fff4e6;
      --text-solution: #f76707;
      --color-validation: #f3f0ff;
      --text-validation: #7048e8;
      
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.05);
      
      --danger-color: #fa5252;
      --danger-hover: #e03131;
    }

    html[data-theme="dark"] {
      --bg-color: #121214;
      --card-bg: #1a1a1e;
      --text-main: #e2e8f0;
      --text-muted: #a0aec0;
      --border-color: #2d3748;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      
      --color-task: rgba(11, 94, 215, 0.2);
      --text-task: #6ea8fe;
      --color-followup: rgba(12, 166, 120, 0.2);
      --text-followup: #4fe3b2;
      --color-solution: rgba(247, 103, 7, 0.2);
      --text-solution: #ffc078;
      --color-validation: rgba(112, 72, 232, 0.2);
      --text-validation: #b197fc;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-top: 5px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .search-wrapper {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px 12px 40px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      background-color: var(--card-bg);
      color: var(--text-main);
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    .filter-btn {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--primary-color);
    }

    .filter-btn.active {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
      color: #ffffff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 240px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-color);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.task { background-color: var(--color-task); color: var(--text-task); }
    .badge.followup { background-color: var(--color-followup); color: var(--text-followup); }
    .badge.solution { background-color: var(--color-solution); color: var(--text-solution); }
    .badge.validation { background-color: var(--color-validation); color: var(--text-validation); }

    .ticket-link {
      font-size: 13px;
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .ticket-link:hover {
      text-decoration: underline;
    }

    .card-body {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
      margin-bottom: 15px;
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 12px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      background-color: rgba(250, 82, 82, 0.1);
      color: var(--danger-color);
    }

    .delete-btn svg {
      width: 16px;
      height: 16px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background-color: var(--card-bg);
      border: 1px dashed var(--border-color);
      border-radius: 16px;
      grid-column: 1 / -1;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .empty-state p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Toast styling */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
    }

    .toast {
      background-color: #2d3748;
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Visualizador de Borradores</h1>
        <div class="subtitle" id="drafts-count">Cargando borradores...</div>
      </div>
      <div>
        <button id="clean-all-btn" class="filter-btn" style="border-color: var(--danger-color); color: var(--danger-color);">Vaciar Todo</button>
      </div>
    </header>

    <div class="controls">
      <div class="search-wrapper">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar por Ticket ID, tipo o contenido...">
      </div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="filter-group">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="task">Tareas</button>
        <button class="filter-btn" data-filter="followup">Seguimientos</button>
        <button class="filter-btn" data-filter="solution">Soluciones</button>
        <button class="filter-btn" data-filter="validation">Validaciones</button>
      </div>
    </div>

    <div id="drafts-grid" class="grid">
      <!-- Cards will be populated dynamically -->
    </div>
  </div>

  <div class="toast-container">
    <div id="copy-toast" class="toast">Borrador copiado al portapapeles</div>
  </div>

  <script src="drafts.js"></script>
</body>
</html>
